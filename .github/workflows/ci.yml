name: ci
on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # https://docs.github.com/en/actions/using-github-hosted-runners
        os:
          [
            ubuntu-latest,
            ubuntu-24.04-arm,
            windows-latest,
            macos-latest,
            macos-15-intel,
          ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - uses: msys2/setup-msys2@v2
        if: runner.os == 'Windows'
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-portaudio

      - name: Add MSYS2 toolchain to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "C:\msys64\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "CC=gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CGO_ENABLED=1" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt install -y libopus-dev libx11-dev pkg-config portaudio19-dev

      - name: Install macOS native dependencies
        if: runner.os == 'macOS'
        run: brew install opus portaudio

      - name: Test
        run: go test -v ./...

      - name: Build
        run: go build -trimpath -ldflags=-s .

      - uses: actions/upload-artifact@v6
        if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        with:
          name: discordo_${{ runner.os }}_${{ runner.arch }}
          path: |
            discordo
            discordo.exe

      - name: Send repository dispatch
        if: ${{ runner.os == 'Windows' && github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh api --method POST -H "Accept: application/vnd.github+json" -f "event_type=discordo-ci-completed" /repos/vvirtues/bucket/dispatches
